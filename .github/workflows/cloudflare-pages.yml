# Optional: deploy the static site to Cloudflare Pages (global edge, typically <1s TTFB).
# 1. Create a Pages project in the Cloudflare dashboard (or let first deploy create it).
# 2. Add repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# 3. Edit --project-name below to match your Pages project name.
# 4. Point 6stars.xyz to Pages (CNAME to *.pages.dev) OR use custom domains in Pages settings.

name: Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=sixstars-site
