server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    open_file_cache max=4000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Cloudflare Pages metadata (not for public download)
    location = /_headers {
        return 404;
    }
    location = /_redirects {
        return 404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # Version query in HTML (?v=…) makes these safe to cache hard at the edge.
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    location ~* \.zip$ {
        default_type application/zip;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|mp4|webm|mov)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
}
