server {
    listen 80;
    listen [::]:80;

    server_name www.6stars.xyz 6stars.xyz;

    # Point to this repository’s site/ directory (absolute path on the server)
    root /home/sanamo/SixStars/site;
    index index.html;

    access_log /var/log/nginx/sixstars-access.log;
    error_log /var/log/nginx/sixstars-error.log;

    open_file_cache max=4000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    location = /_headers {
        return 404;
    }
    location = /_redirects {
        return 404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Match HTML asset URLs: styles.css?v=N — bump N when CSS/JS changes.
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    location ~* \.zip$ {
        default_type application/zip;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "public, max-age=604800" always;
        expires 7d;
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|mp4|webm|mov)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
}
