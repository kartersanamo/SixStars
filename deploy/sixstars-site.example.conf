server {
    listen 80;
    listen [::]:80;

    server_name www.6stars.xyz 6stars.xyz;

    # Point to this repository’s site/ directory (absolute path on the server)
    root /home/sanamo/SixStars/site;
    index index.html;

    access_log /var/log/nginx/sixstars-access.log;
    error_log /var/log/nginx/sixstars-error.log;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
